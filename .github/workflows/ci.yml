# .github/workflows/ci.yml — Remote Desktop Monitoring CI
# Runs on: push to main/develop, all PRs
#
# Jobs:
#   backend-test  — pytest (SQLite in-memory, no Postgres needed)
#   signaling-test — Jest unit tests
#   frontend-build — lint + Vite build
#   e2e            — Playwright (against built frontend + mock backend)
# ─────────────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  # Shared across jobs that need a 32-char secret for validation checks
  JWT_SECRET: "ci-test-secret-that-is-32-chars-!"
  DEVICE_TOKEN_SECRET: "ci-device-secret-32-chars-00000!"

# ─── Backend Python tests ────────────────────────────────────────────────────
jobs:
  backend-test:
    name: "Backend API (pytest)"
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend-api

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend-api/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest with coverage
        env:
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          JWT_SECRET: ${{ env.JWT_SECRET }}
          DEVICE_TOKEN_SECRET: ${{ env.DEVICE_TOKEN_SECRET }}
          PYTHONPATH: ${{ github.workspace }}/backend-api
        run: |
          pytest --cov=app --cov-report=xml --cov-report=term-missing -q

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend-api/coverage.xml

# ─── Signaling server (Jest) ─────────────────────────────────────────────────
  signaling-test:
    name: "Signaling Server (Jest)"
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: signaling-server

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: signaling-server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Jest
        run: npm test -- --coverage

# ─── Frontend (lint + build) ─────────────────────────────────────────────────
  frontend-build:
    name: "Frontend (lint + build)"
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: "http://localhost:8000"
          VITE_SIGNALING_URL: "ws://localhost:4000/ws"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 3

# ─── Playwright e2e ──────────────────────────────────────────────────────────
  e2e:
    name: "E2E (Playwright)"
    runs-on: ubuntu-latest
    needs: [frontend-build]

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      - name: Serve built frontend
        run: npx serve -s dist -l 5173 &
        working-directory: frontend

      - name: Run Playwright tests
        run: npx playwright test
        env:
          PLAYWRIGHT_BASE_URL: "http://localhost:5173"
          CI: "true"

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
