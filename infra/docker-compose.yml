version: "3.9"

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [rdm]

  # ── coturn STUN/TURN ────────────────────────────────────────────────────────
  coturn:
    image: coturn/coturn:latest
    restart: unless-stopped
    network_mode: host          # Required for UDP relay to work correctly
    volumes:
      - ./coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro
      - certbot_conf:/etc/letsencrypt:ro
    command: -c /etc/coturn/turnserver.conf
    environment:
      TURN_SECRET:  ${TURN_SECRET}
      TURN_DOMAIN:  ${TURN_DOMAIN}

  # ── Signaling server ────────────────────────────────────────────────────────
  signaling-server:
    build:
      context: ../signaling-server
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      JWT_SECRET:         ${JWT_SECRET}
      SIGNALING_PORT:     ${SIGNALING_PORT:-4000}
      TURN_SECRET:        ${TURN_SECRET}
      TURN_DOMAIN:        ${TURN_DOMAIN}
      TURN_PORT:          ${TURN_PORT:-3478}
      WS_MAX_CONNS_PER_IP: ${WS_MAX_CONNS_PER_IP:-10}
      WS_PING_INTERVAL_MS: ${WS_PING_INTERVAL_MS:-30000}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks: [rdm]

  # ── Backend API (FastAPI) ───────────────────────────────────────────────────
  backend-api:
    build:
      context: ../backend-api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL:       ${DATABASE_URL}
      JWT_SECRET:         ${JWT_SECRET}
      JWT_ALGORITHM:      HS256
      JWT_EXPIRE_MINUTES: 480
      CORS_ORIGINS:       ${CORS_ORIGINS}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
    networks: [rdm]

  # ── Frontend (React + Nginx) ────────────────────────────────────────────────
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on: [backend-api, signaling-server]
    networks: [rdm]

  # ── Nginx reverse proxy + TLS ───────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_conf:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on: [frontend, backend-api, signaling-server]
    networks: [rdm]

  # ── Certbot (SSL renewal) ───────────────────────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: >
      sh -c "trap exit TERM;
             while :; do
               certbot renew --webroot -w /var/www/certbot --quiet;
               sleep 12h;
             done"

  # ── Prometheus ─────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.52.0
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks: [rdm]

  # ── Grafana ────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.0.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-ChangeMe123!}
      GF_USERS_ALLOW_SIGN_UP:     "false"
      GF_SERVER_ROOT_URL:         "%(protocol)s://%(domain)s/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on: [prometheus]
    networks: [rdm]

volumes:
  postgres_data:
  certbot_conf:
  certbot_www:
  prometheus_data:
  grafana_data:

networks:
  rdm:
    driver: bridge
