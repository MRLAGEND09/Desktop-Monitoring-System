# ── Rate limiting zones — MUST be in http {} context (this file is included
#    inside http {} by /etc/nginx/nginx.conf → conf.d/*.conf)
limit_req_zone $binary_remote_addr zone=auth_limit:10m    rate=5r/m;
limit_req_zone $binary_remote_addr zone=api_limit:20m     rate=60r/m;
limit_req_zone $binary_remote_addr zone=device_limit:20m  rate=120r/m;

# Hide nginx version from error pages and Server header
server_tokens off;

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    server_name ${DOMAIN} www.${DOMAIN};

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS main ────────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name ${DOMAIN} www.${DOMAIN};

    ssl_certificate     /etc/letsencrypt/live/${DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${DOMAIN}/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security  "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options     "nosniff"                                      always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"              always;
    add_header Cross-Origin-Opener-Policy "same-origin"                                  always;
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()"     always;
    # frame-ancestors supersedes X-Frame-Options when CSP is supported
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' wss://${DOMAIN}; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'; upgrade-insecure-requests" always;

    # Request limits
    client_max_body_size 2m;

    # General API rate limit — applied to all /api/ locations unless overridden
    limit_req_status 429;

    # ── Frontend SPA ─────────────────────────────────────────────────────────
    location / {
        proxy_pass         http://frontend:80;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Backend API (general — 60 req/min per IP) ────────────────────────────
    location /api/ {
        limit_req          zone=api_limit burst=20 nodelay;
        proxy_pass         http://backend-api:8000/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Login — strict rate limit (5 req/min, burst 3) ───────────────────────
    location /api/auth/login {
        limit_req          zone=auth_limit burst=3 nodelay;
        proxy_pass         http://backend-api:8000/auth/login;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Device endpoints — higher limit (agents send every 30s) ─────────────
    location ~ ^/api/devices/[^/]+/heartbeat$ {
        limit_req          zone=device_limit burst=10 nodelay;
        proxy_pass         http://backend-api:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /api/logs {
        limit_req          zone=device_limit burst=10 nodelay;
        proxy_pass         http://backend-api:8000/logs;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Signaling REST (TURN credentials) ───────────────────────────────────
    location /api/signaling/ {
        limit_req          zone=api_limit burst=10 nodelay;
        proxy_pass         http://signaling-server:4000/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Signaling WebSocket ──────────────────────────────────────────────────
    location /signaling {
        proxy_pass          http://signaling-server:4000/ws;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade    $http_upgrade;
        proxy_set_header    Connection "Upgrade";
        proxy_set_header    Host       $host;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }

    # ── Grafana (admin-facing, internal only — restrict to VPN/office IPs) ──
    location /grafana/ {
        # Uncomment and set to office/VPN IP range in production:
        # allow 10.0.0.0/8;
        # deny  all;
        proxy_pass         http://grafana:3000/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
