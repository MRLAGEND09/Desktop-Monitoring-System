# coturn STUN/TURN server configuration
# Docs: https://github.com/coturn/coturn

# Listening ports
listening-port=3478
tls-listening-port=5349

# Relay IP (set to server's public IP in production)
# relay-ip=YOUR_PUBLIC_IP

# External IP — coturn auto-detects via STUN
# external-ip=YOUR_PUBLIC_IP

# Ephemeral HMAC credentials (more secure than static user/password)
use-auth-secret
static-auth-secret=${TURN_SECRET}
realm=${TURN_DOMAIN}

# Relay port range
min-port=49152
max-port=65535

# TLS certificate paths (shared with Nginx/Certbot)
cert=/etc/ssl/certs/turn.pem
pkey=/etc/ssl/private/turn.key

# Security
no-multicast-peers
denied-peer-ip=0.0.0.0-0.255.255.255
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=100.64.0.0-100.127.255.255
denied-peer-ip=127.0.0.0-127.255.255.255
denied-peer-ip=169.254.0.0-169.254.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.0.0.0-192.0.0.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=198.18.0.0-198.19.255.255

# Logging
log-file=/var/log/coturn/coturn.log
simple-log
